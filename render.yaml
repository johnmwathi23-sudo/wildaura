services:
  - type: web
    name: wild-aura-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: M_PESA_CONSUMER_KEY
        sync: false
      - key: M_PESA_CONSUMER_SECRET
        sync: false
      - key: M_PESA_PASSKEY
        sync: false
      - key: M_PESA_SHORTCODE
        value: "174379"
      - key: M_PESA_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        value: https://wild-aura.vercel.app
